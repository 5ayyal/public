<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khayyal Kherais — Developer & Founder</title>
<meta name="description" content="Independent developer & founder of Thaki Tech. iOS, Android, AI-native products from Saudi Arabia." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body, #root { margin: 0; }
  body {
    background: #06070D;
    color: #F5F5FA;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
  }
  #root { display: flex; justify-content: center; }
  /* scale wrapper for narrower viewports — JS-driven so transform stays valid */
  .stage {
    width: 1280px;
    transform-origin: top center;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="portfolio-cosmic.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#96d35f",
  "accent2": "#00c7fc",
  "accent3": "#ff6251"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const stageRef = React.useRef(null);
  React.useEffect(() => {
    const fit = () => {
      const el = stageRef.current; if (!el) return;
      const STAGE_W = 1280;
      const vw = window.innerWidth;
      const scale = Math.min(1, vw / (STAGE_W + 40));
      el.style.transform = `scale(${scale})`;
      // reserve scaled height so the page isn't taller than needed
      el.style.marginBottom = `${(scale - 1) * el.offsetHeight}px`;
    };
    fit();
    window.addEventListener('resize', fit);
    // also refit once images/fonts settle
    const t = setTimeout(fit, 400);
    return () => { window.removeEventListener('resize', fit); clearTimeout(t); };
  }, []);
  return (
    <>
      <div className="stage" ref={stageRef}>
        <CosmicPortfolio
          accent={tweaks.accent}
          accent2={tweaks.accent2}
          accent3={tweaks.accent3}
          logoSrc="assets/thaki-tech-logo.jpeg"
        />
      </div>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Palette">
          <TweakColor label="Accent 1" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />
          <TweakColor label="Accent 2" value={tweaks.accent2} onChange={(v) => setTweak('accent2', v)} />
          <TweakColor label="Accent 3" value={tweaks.accent3} onChange={(v) => setTweak('accent3', v)} />
          <TweakButton onClick={() => setTweak({ accent: '#96d35f', accent2: '#00c7fc', accent3: '#caf0fe' })}>Current (lime / cyan / ice)</TweakButton>
          <TweakButton onClick={() => setTweak({ accent: '#7DD3FC', accent2: '#A78BFA', accent3: '#F472B6' })}>Original cosmic</TweakButton>
          <TweakButton onClick={() => setTweak({ accent: '#34D399', accent2: '#60A5FA', accent3: '#F472B6' })}>Aurora borealis</TweakButton>
          <TweakButton onClick={() => setTweak({ accent: '#FF6B6B', accent2: '#FFD93D', accent3: '#6BCB77' })}>Sunset desert</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
